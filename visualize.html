<!-- Specter's Music Visualizer -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Specters Hybrid Geometric Music Visualizer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #111;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        #controls {
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-bottom: 1px solid #333;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
        }

        select, input[type="color"], input[type="file"] {
            background: #222;
            border: 1px solid #444;
            color: #fff;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            outline: none;
        }

        input[type="color"] {
            padding: 2px;
            width: 40px;
            height: 30px;
        }

        audio {
            height: 32px;
        }

        #visualizer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .hidden {
            display: none !important;
        }

        #playlistGroup {
            gap: 10px;
        }

        #playlistContainer {
            position: absolute;
            top: 100px; /* Below controls bar */
            right: 20px;
            width: 300px;
            max-height: calc(100vh - 90px);
            overflow-y: auto;
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            padding: 10px;
            z-index: 10;
        }

        #playlistContainer ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        #playlist li {
            padding: 8px 12px;
            margin: 4px 0;
            background: #2a2a2a;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #playlist li:hover {
            background: #3a3a3a;
        }

        #playlist li.active {
            background: #444;
            color: #00ffcc;
            font-weight: bold;
        }

        #playlist li .remove-btn {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 1rem;
            padding: 0 4px;
        }

        #playlist li .remove-btn:hover {
            color: #ff4444;
        }

        button {
            background: #333;
            border: 1px solid #555;
            color: #fff;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #444;
        }

        #trackTitle {
            font-size: 0.85rem;
            color: #ccc;
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: #333;
            border-radius: 8px 8px 0 0;
            cursor: grab;
            user-select: none;
        }

        .playlist-header:active {
            cursor: grabbing;
        }

        #closePlaylistBtn {
            background: none;
            border: none;
            color: #aaa;
            font-size: 1rem;
            cursor: pointer;
            padding: 2px 6px;
        }

        #closePlaylistBtn:hover {
            color: #ff4444;
        }

        #playlistContainer ul {
            padding-top: 8px;
            border-radius: 0 0 8px 8px;
        }
    </style>
</head>
<body>

    <div id="controls">
        <div class="control-group">
            <label for="audioSource">Input Mode:</label>
            <select id="audioSource">
                <option value="free">Free Mode (Ambient)</option>
                <option value="file">MP3 File Player</option>
                <option value="mic">Live Microphone</option>
            </select>
        </div>

        <div class="control-group hidden" id="fileInputGroup">
            <label for="audioFile">Choose MP3:</label>
            <input type="file" id="audioFile" accept="audio/*">
        </div>
        
        <div class="control-group hidden" id="audioPlayerGroup">
            <audio id="audioPlayer" controls></audio>
        </div>

        <div class="control-group hidden" id="playlistGroup">
            <label>Playlist:</label>
            <input type="file" id="playlistInput" accept="audio/*" multiple>
            <button id="prevBtn">⏮</button>
            <button id="nextBtn">⏭</button>
            <button id="shuffleBtn">🔀 Shuffle</button>
            <span id="trackTitle"></span>
        </div>

        <div id="playlistContainer" class="hidden">
            <div class="playlist-header">
                <span>Playlist</span>
                <button id="closePlaylistBtn">✕</button>
            </div>
            <ul id="playlist"></ul>
        </div>

        <div class="control-group">
            <label for="shapeSelect">Shape:</label>
            <select id="shapeSelect">
                <option value="bars">Classic Bars</option>
                <option value="circle">Pulsing Circle</option>
                <option value="spikes">Starburst Spikes</option>
                <option value="lava">Lava Lamp</option>
                <option value="plasma">Electric Plasma Globe</option>
            </select>
        </div>

        <div class="control-group">
            <label for="visualColor">Visual Color:</label>
            <input type="color" id="visualColor" value="#00ffcc">
        </div>

        <div class="control-group">
            <label for="bgColor">Background:</label>
            <input type="color" id="bgColor" value="#111111">
        </div>
    </div>

    <canvas id="visualizer"></canvas>

    <script>
        // UI Elements
        const audioSourceSelect = document.getElementById('audioSource');
        const fileInputGroup = document.getElementById('fileInputGroup');
        const audioPlayerGroup = document.getElementById('audioPlayerGroup');
        const audioFile = document.getElementById('audioFile');
        const audioPlayer = document.getElementById('audioPlayer');
        
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        const shapeSelect = document.getElementById('shapeSelect');
        const visualColorPicker = document.getElementById('visualColor');
        const bgColorPicker = document.getElementById('bgColor');

        // Web Audio & Simulation Variables
        let audioCtx = null;
        let analyser = null;
        let fileSourceNode = null;
        let micSourceNode = null;
        let micStream = null; 
        
        // Base Setup (Defaults to 128 bins for instant Free Mode execution)
        let bufferLength = 128;
        let dataArray = new Uint8Array(bufferLength);
        let freeModeTime = 0; 

        // Playlist variiables
        let playlist = [];          // Array of {name, url, element} objects
        let currentTrackIndex = -1;
        let isShuffled = false;

        // --- Plasma Globe state ---
        let plasmaNodes = [];
        const NUM_PLASMA_NODES = 18;
        let plasmaArcs = [];  // array of { from, to, life } for lightning bolts

        // Resize canvas
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            //Resize Plasma for Electric Visualizer
            initPlasma();
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 1. Input Routing Orchestrator
        audioSourceSelect.addEventListener('change', function() {
            const mode = this.value;

            if (mode === 'free') {
                fileInputGroup.classList.add('hidden');
                audioPlayerGroup.classList.add('hidden');
                audioPlayer.pause();
                stopMicAudio();
                //Handle Play list buttons
                document.getElementById('playlistGroup').classList.add('hidden');
                document.getElementById('playlistContainer').classList.add('hidden');
            } 
            else if (mode === 'mic') {
                fileInputGroup.classList.add('hidden');
                audioPlayerGroup.classList.add('hidden');
                audioPlayer.pause();
                setupMicAudio();
                //Handle Play list buttons
                document.getElementById('playlistGroup').classList.add('hidden');
                document.getElementById('playlistContainer').classList.add('hidden');
            } 
            else if (mode === 'file') {
                fileInputGroup.classList.remove('hidden');
                audioPlayerGroup.classList.remove('hidden');
                //Handle Play list buttons
                document.getElementById('playlistGroup').classList.remove('hidden');
                document.getElementById('playlistContainer').classList.remove('hidden');
                stopMicAudio();
                setupFileAudio();
            }
        });

/*         // 2. Handle MP3 Selection Flow
        audioFile.addEventListener('change', function() {
            const files = this.files;
            if (files.length === 0) return;
            
            const fileURL = URL.createObjectURL(files[0]);
            audioPlayer.src = fileURL;
            audioPlayer.load();
            audioPlayer.play();
            
            setupFileAudio();
        }); */
        
        // 2. Handle MP3 Selection Flow and Playlisting
        const playlistInput = document.getElementById('playlistInput');

        playlistInput.addEventListener('change', function() {
            const files = this.files;
            if (files.length === 0) return;

            for (let file of files) {
                const fileURL = URL.createObjectURL(file);
                playlist.push({ name: file.name, url: fileURL });
            }

            renderPlaylist();

            // If nothing is playing yet, start the first track
            if (currentTrackIndex === -1 && playlist.length > 0) {
                loadAndPlayTrack(0);
            }
        });

        //Render the play list we just created
        function renderPlaylist() {
            const list = document.getElementById('playlist');
            list.innerHTML = '';

            playlist.forEach((track, index) => {
                const li = document.createElement('li');
                if (index === currentTrackIndex) li.classList.add('active');

                const span = document.createElement('span');
                span.textContent = track.name;
                li.appendChild(span);

                const removeBtn = document.createElement('button');
                removeBtn.textContent = '×';
                removeBtn.classList.add('remove-btn');
                removeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    removeFromPlaylist(index);
                });
                li.appendChild(removeBtn);

                li.addEventListener('click', () => loadAndPlayTrack(index));
                list.appendChild(li);
            });
        }

        //Lets load and play track from the playlist
        function loadAndPlayTrack(index) {
            if (index < 0 || index >= playlist.length) return;

            currentTrackIndex = index;
            audioPlayer.src = playlist[index].url;
            audioPlayer.load();
            audioPlayer.play();
            document.getElementById('trackTitle').textContent = playlist[index].name;

            setupFileAudio();
            renderPlaylist(); // Re-render to update active state
        }

        //Removing a song from playlist
        function removeFromPlaylist(index) {
            if (index === currentTrackIndex) {
                audioPlayer.pause();
                audioPlayer.src = '';
                currentTrackIndex = -1;
                document.getElementById('trackTitle').textContent = '';
            } else if (index < currentTrackIndex) {
                currentTrackIndex--;
            }

            playlist.splice(index, 1);
            renderPlaylist();
        }

        function playNext() {
            if (playlist.length === 0) return;

            let nextIndex;
            if (isShuffled) {
                nextIndex = Math.floor(Math.random() * playlist.length);
            } else {
                nextIndex = (currentTrackIndex + 1) % playlist.length;
            }
            loadAndPlayTrack(nextIndex);
        }

        function playPrevious() {
            if (playlist.length === 0 || currentTrackIndex <= 0) return;
            loadAndPlayTrack(currentTrackIndex - 1);
        }

        function toggleShuffle() {
            isShuffled = !isShuffled;
            document.getElementById('shuffleBtn').style.background = isShuffled ? '#555' : '#333';
        }

        //Adding the playlist buttons element IDS
        document.getElementById('prevBtn').addEventListener('click', playPrevious);
        document.getElementById('nextBtn').addEventListener('click', playNext);
        document.getElementById('shuffleBtn').addEventListener('click', toggleShuffle);

        // Auto-advance when a track ends
        audioPlayer.addEventListener('ended', playNext);

        // Audio Context Bootstrapper
        function initAudioEngine() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256; // 128 frequency bins
                bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // Routing Path: MP3
        function setupFileAudio() {
            initAudioEngine();
            if (!fileSourceNode) {
                fileSourceNode = audioCtx.createMediaElementSource(audioPlayer);
            }
            fileSourceNode.disconnect();
            fileSourceNode.connect(analyser);
            analyser.disconnect();
            analyser.connect(audioCtx.destination); 
        }

        // Routing Path: Microphone
        function setupMicAudio() {
            initAudioEngine();
            navigator.mediaDevices.getUserMedia({ audio: true, video: false })
                .then(function(stream) {
                    micStream = stream;
                    micSourceNode = audioCtx.createMediaStreamSource(stream);
                    micSourceNode.connect(analyser);
                    analyser.disconnect(); 
                })
                .catch(function(err) {
                    console.error('Microphone access denied:', err);
                    alert('Could not access microphone. Falling back to Free Mode.');
                    audioSourceSelect.value = 'free';
                    audioSourceSelect.dispatchEvent(new Event('change'));
                });
        }

        // Disconnect and shutdown mic recording stream
        function stopMicAudio() {
            if (micStream) {
                micStream.getTracks().forEach(track => track.stop());
                micStream = null;
            }
            if (micSourceNode) {
                micSourceNode.disconnect();
                micSourceNode = null;
            }
        }

        // 3. Ambient Math Generator (The Free Mode Engine, controls the visuals with no music sync)
        function simulateAmbientFrequencies() {
            freeModeTime += 0.025; // Speed of the animations evolving

            for (let i = 0; i < bufferLength; i++) {
                // Layer multiple mathematical sine waves moving at different speeds
                const wave1 = Math.sin(freeModeTime + i * 0.12);
                const wave2 = Math.cos(freeModeTime * 0.65 + i * 0.08);
                const wave3 = Math.sin(freeModeTime * 1.32 + i * 0.25);
                
                // Blend and normalize them (-1 to 1 range)
                const blendedWave = (wave1 + wave2 + wave3) / 3;
                
                // Map the results cleanly to a natural audio frequency curve (0-255 scaling)
                // Bass frequencies (lower index values) are given a natural amplification bump
                const bassBias = Math.max(0, (bufferLength - i) / bufferLength);
                const magnitude = (blendedWave + 1) * 100 + (bassBias * 45);
                
                dataArray[i] = Math.min(255, Math.max(0, magnitude));
            }
        }

        // --- Playlist Container Dragging ---
        const playlistContainer = document.getElementById('playlistContainer');
        const playlistHeader = playlistContainer.querySelector('.playlist-header');
        let isDragging = false;
        let dragOffsetX = 0, dragOffsetY = 0;

        const startDrag = (e) => {
            if (e.target.id === 'closePlaylistBtn') return;

            isDragging = true;
            e.preventDefault(); // prevent text selection / scroll

            const rect = playlistContainer.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            dragOffsetX = clientX - rect.left;
            dragOffsetY = clientY - rect.top;

            // Remove transform centering so we can position freely
            playlistContainer.style.transform = 'none';
            playlistHeader.style.cursor = 'grabbing';
        };

        const onDrag = (e) => {
            if (!isDragging) return;
            e.preventDefault();

            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            const x = clientX - dragOffsetX;
            const y = clientY - dragOffsetY;

            playlistContainer.style.left = `${x}px`;
            playlistContainer.style.top = `${y}px`;
        };

        const endDrag = () => {
            if (!isDragging) return;
            isDragging = false;
            playlistHeader.style.cursor = 'grab';
        };

        // Mouse events (desktop)
        playlistHeader.addEventListener('mousedown', startDrag);
        document.addEventListener('mousemove', onDrag);
        document.addEventListener('mouseup', endDrag);

        // Touch events (mobile)
        playlistHeader.addEventListener('touchstart', startDrag, { passive: false });
        document.addEventListener('touchmove', onDrag, { passive: false });
        document.addEventListener('touchend', endDrag);       

        // 4. Main Rendering Framework
        function draw() {
            requestAnimationFrame(draw);

            const currentMode = audioSourceSelect.value;

            // Fetch live audio data OR run math injection
            if (currentMode === 'free') {
                simulateAmbientFrequencies();
            } else if (analyser) {
                analyser.getByteFrequencyData(dataArray);
            }

            // Canvas Painting
            ctx.fillStyle = bgColorPicker.value;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const visualColor = visualColorPicker.value;
            ctx.fillStyle = visualColor;
            ctx.strokeStyle = visualColor;

            const currentShape = shapeSelect.value;
            if (currentShape === 'bars') drawBars();
            else if (currentShape === 'circle') drawCircle();
            else if (currentShape === 'spikes') drawSpikes();
            else if (currentShape === 'lava') drawLava();
            else if (currentShape === 'plasma') drawPlasma();

            // Draw track name overlay in file mode
            if (currentMode === 'file' && currentTrackIndex >= 0) {
                drawTrackTitleOverlay();
            }
        }

        //Gets the Canvas layout and formats the track title to be displayed for overlay
        function drawTrackTitleOverlay() {
            const text = playlist[currentTrackIndex]?.name || '';
            if (!text) return;

            const padding = 20;
            const cornerX = padding;
            const cornerY = canvas.height - padding;

            ctx.font = 'bold 16px "Segoe UI", Tahoma, Geneva, Verdana, sans-serif';
            const metrics = ctx.measureText(text);
            const textWidth = metrics.width;
            const pillHeight = 36;
            const pillPadding = 12;
            const pillWidth = textWidth + pillPadding * 2;

            // Draw semi-transparent dark background pill (right-aligned at bottom)
            ctx.globalAlpha = 0.7;
            ctx.fillStyle = '#000';
            const pillX = cornerX;  // bottom-left
            const pillY = cornerY - pillHeight;
            ctx.beginPath();
            roundRect(ctx, pillX, pillY, pillWidth, pillHeight, 8);
            ctx.fill();

            // Draw text
            ctx.globalAlpha = 1.0;
            ctx.fillStyle = '#ffffff';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, pillX + pillPadding, pillY + pillHeight / 2);
        }

        // Helper: rounded rectangle path
        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        // --- GRAPHICS EQUATIONS FOR VISUALIZERS---
        function drawBars() {
            const barWidth = (canvas.width / bufferLength) * 1.5;
            let x = 0;
            for (let i = 0; i < bufferLength; i++) {
                const barHeight = (dataArray[i] / 255) * (canvas.height * 0.7);
                ctx.globalAlpha = dataArray[i] / 255 + 0.15;
                ctx.fillRect(x, canvas.height - barHeight, barWidth - 2, barHeight);
                x += barWidth;
            }
            ctx.globalAlpha = 1.0;
        }

        function drawCircle() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            let sum = 0;
            for(let i = 0; i < bufferLength; i++) sum += dataArray[i];
            const average = sum / bufferLength;
            const baseRadius = 80 + (average * 0.5);

            ctx.beginPath();
            ctx.arc(centerX, centerY, baseRadius, 0, Math.PI * 2);
            ctx.globalAlpha = 0.25;
            ctx.fill();

            ctx.beginPath();
            for (let i = 0; i < bufferLength; i++) {
                const angle = (i / bufferLength) * Math.PI * 2;
                const offset = (dataArray[i] / 255) * 120;
                const r = baseRadius + offset;
                const x = centerX + Math.cos(angle) * r;
                const y = centerY + Math.sin(angle) * r;

                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.globalAlpha = 0.8;
            ctx.lineWidth = 4;
            ctx.stroke();
            ctx.globalAlpha = 1.0;
        }

        function drawSpikes() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const innerRadius = 50;
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';

            for (let i = 0; i < bufferLength; i++) {
                const angle = (i / bufferLength) * Math.PI * 2;
                const spikeLength = (dataArray[i] / 255) * 220;
                const startX = centerX + Math.cos(angle) * innerRadius;
                const startY = centerY + Math.sin(angle) * innerRadius;
                const endX = centerX + Math.cos(angle) * (innerRadius + spikeLength);
                const endY = centerY + Math.sin(angle) * (innerRadius + spikeLength);

                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(endX, endY);
                ctx.stroke();
            }
        }
        // --- Hold blob state  ---
        let lavaBlobs = [];
        const NUM_BLOBS = 25;

        function initLavaBlobs() {
            lavaBlobs = [];
            for (let i = 0; i < NUM_BLOBS; i++) {
                lavaBlobs.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: 15 + Math.random() * 35,
                    speedY: 0,
                    freqIndex: Math.floor(Math.random() * bufferLength), // which frequency bin drives this blob
                    hueShift: Math.random() * 40 - 20 // slight color variation per blob
                });
            }
        }

        // --- GRAPHICS EQUATIONS FOR VISUALIZERS---

        function drawLava() {
            // Initialize blobs on first call
            if (lavaBlobs.length === 0) {
                initLavaBlobs();
            }

            // Semi-transparent background fill for trail/ghosting effect (classic lava lamp persistence)
            ctx.globalAlpha = 0.12;
            ctx.fillStyle = bgColorPicker.value;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalAlpha = 1.0;

            const visualColor = visualColorPicker.value;

            for (let b = 0; b < lavaBlobs.length; b++) {
                const blob = lavaBlobs[b];

                // Read audio energy for this blob's assigned frequency bin
                const audioValue = dataArray[blob.freqIndex] / 255; // 0..1

                // Blobs rise when their frequency band is active, fall gently otherwise
                // Bass-heavy frequencies (lower indices) get more upward thrust
                const bassBoost = 1.0 + ((bufferLength - blob.freqIndex) / bufferLength) * 1.5;
                blob.speedY += (audioValue * bassBoost - 0.3) * 2;

                // Damping so blobs don't fly off uncontrollably
                blob.speedY *= 0.92;

                // Slight horizontal drift for organic movement
                blob.x += Math.sin(performance.now() * 0.001 + b) * 0.3;

                // Move vertically
                blob.y += blob.speedY;

                // Wrap around screen edges
                if (blob.y < -blob.radius * 2) {
                    blob.y = canvas.height + blob.radius * 2;
                    blob.x = Math.random() * canvas.width;
                } else if (blob.y > canvas.height + blob.radius * 2) {
                    blob.y = -blob.radius * 2;
                    blob.x = Math.random() * canvas.width;
                }

                // Dynamic radius pulsing based on audio
                const pulseRadius = blob.radius + (audioValue * blob.radius * 0.6);

                // Draw glowing blob using radial gradient
                const gradient = ctx.createRadialGradient(
                    blob.x, blob.y, 0,
                    blob.x, blob.y, pulseRadius
                );

                // Convert hex to RGB for alpha manipulation
                const r = parseInt(visualColor.slice(1, 3), 16);
                const g = parseInt(visualColor.slice(3, 5), 16);
                const bl = parseInt(visualColor.slice(5, 7), 16);

                gradient.addColorStop(0, `rgba(${r}, ${g}, ${bl}, 0.9)`);
                gradient.addColorStop(0.4, `rgba(${r}, ${g}, ${bl}, 0.5)`);
                gradient.addColorStop(1, `rgba(${r}, ${g}, ${bl}, 0.0)`);

                ctx.globalAlpha = 0.7 + audioValue * 0.3;
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(blob.x, blob.y, pulseRadius, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.globalAlpha = 1.0;
        }

        //Lets create some plasma nodes to connect plasma to
        function initPlasma() {
            plasmaNodes = [];
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            for (let i = 0; i < NUM_PLASMA_NODES; i++) {
                const angle = (i / NUM_PLASMA_NODES) * Math.PI * 2 + Math.random() * 0.5;
                const dist = 140 + Math.random() * 160;
                plasmaNodes.push({
                    baseX: cx + Math.cos(angle) * dist,
                    baseY: cy + Math.sin(angle) * dist,
                    x: cx + Math.cos(angle) * dist,
                    y: cy + Math.sin(angle) * dist,
                    angleOffset: angle,
                    distOffset: dist,
                    driftSpeed: 0.3 + Math.random() * 0.5,
                    freqIndex: Math.floor(Math.random() * bufferLength),
                });
            }
        }

        //lets draw the plasma to the nodes
        function drawPlasma() {
            if (plasmaNodes.length === 0) initPlasma();

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const visualColor = visualColorPicker.value;
            const r = parseInt(visualColor.slice(1, 3), 16);
            const g = parseInt(visualColor.slice(3, 5), 16);
            const b = parseInt(visualColor.slice(5, 7), 16);

            // Compute average audio level for global pulse
            let sum = 0;
            for (let i = 0; i < bufferLength; i++) sum += dataArray[i];
            const avg = sum / bufferLength / 255;   // 0..1

            // --- Ghosting background ---
            ctx.globalAlpha = 0.15 + (1 - avg) * 0.1;   // more persistence when quiet
            ctx.fillStyle = bgColorPicker.value;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalAlpha = 1.0;

            const time = performance.now() * 0.002;

            // --- Update node positions (gentle drift) ---
            for (let n = 0; n < plasmaNodes.length; n++) {
                const nd = plasmaNodes[n];
                const audioDrive = dataArray[nd.freqIndex] / 255;
                nd.x = nd.baseX + Math.sin(time * nd.driftSpeed + n) * 20;
                nd.y = nd.baseY + Math.cos(time * nd.driftSpeed * 0.7 + n) * 15;
            }

            // --- Draw electric arcs (lightning bolts) ---
            ctx.lineWidth = 1.5;
            ctx.lineCap = 'round';

            // Pick random pairs to connect, driven by audio energy
            const numArcs = Math.max(4, Math.floor(avg * 14));
            for (let a = 0; a < numArcs; a++) {
                // Decide: does this arc go from center to a node, or node-to-node?
                const useCenter = Math.random() < 0.35 || a === 0;
                const fromIdx = Math.floor(Math.random() * plasmaNodes.length);
                let toIdx;
                do { toIdx = Math.floor(Math.random() * plasmaNodes.length); } while (toIdx === fromIdx && plasmaNodes.length > 1);

                const fromPt = useCenter ? { x: cx, y: cy } : plasmaNodes[fromIdx];
                const toPt   = plasmaNodes[toIdx];

                // Arc brightness proportional to the "louder" of the two linked frequencies
                const energyA = dataArray[plasmaNodes[fromIdx].freqIndex || 0] / 255;
                const energyB = dataArray[plasmaNodes[toIdx].freqIndex] / 255;
                const brightness = Math.max(energyA, energyB);

                // Color shift: bright core with slight hue variation per arc
                const shift = Math.floor(Math.random() * 80 - 40);
                ctx.strokeStyle = `rgba(${Math.min(255, r + shift)},${Math.min(255, g + shift)},${Math.min(255, b + shift)},${0.3 + brightness * 0.7})`;
                ctx.shadowBlur = 12 + brightness * 20;
                ctx.shadowColor = visualColor;

                // Draw a jagged lightning path using mid-point displacement
                drawLightningBolt(fromPt.x, fromPt.y, toPt.x, toPt.y, 3, 15 * (0.5 + brightness));
            }

            // --- Draw the central plasma globe ---
            const globeRadius = 60 + avg * 40;
            const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, globeRadius);
            gradient.addColorStop(0, `rgba(${Math.min(255,r+80)},${Math.min(255,g+80)},${Math.min(255,b+80)},0.9)`);
            gradient.addColorStop(0.4, `rgba(${r},${g},${b},0.6)`);
            gradient.addColorStop(1, `rgba(${r},${g},${b},0.0)`);

            ctx.shadowBlur = 30 + avg * 40;
            ctx.shadowColor = visualColor;
            ctx.beginPath();
            ctx.arc(cx, cy, globeRadius, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();

            // --- Draw plasma nodes as glowing dots ---
            for (let n = 0; n < plasmaNodes.length; n++) {
                const nd = plasmaNodes[n];
                const energy = dataArray[nd.freqIndex] / 255;
                const radius = 4 + energy * 8;

                ctx.shadowBlur = 15 + energy * 25;
                ctx.shadowColor = visualColor;
                ctx.beginPath();
                ctx.arc(nd.x, nd.y, radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${0.5 + energy * 0.5})`;
                ctx.fill();
            }

            // Reset shadow for next frame
            ctx.shadowBlur = 0;
        }

        // Helper: recursive mid-point displacement for jagged lightning
        function drawLightningBolt(x1, y1, x2, y2, depth, displacement) {
            if (depth === 0) {
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
                return;
            }
            const mx = (x1 + x2) / 2 + (Math.random() - 0.5) * displacement;
            const my = (y1 + y2) / 2 + (Math.random() - 0.5) * displacement;
            drawLightningBolt(x1, y1, mx, my, depth - 1, displacement * 0.5);
            drawLightningBolt(mx, my, x2, y2, depth - 1, displacement * 0.5);
        }

        // Device click validation
        canvas.addEventListener('click', () => {
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        });

        // Initialize display immediately on page load
        draw();
    </script>
</body>
